<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HomeSmart Board</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Task Management -->
            <div class="col-md-4">
                <div class="card mt-4">
                    <div class="card-header">
                        <h3>Tasks</h3>
                    </div>
                    <div class="card-body">
                        <form action="/add_task" method="POST">
                            <div class="mb-3">
                                <input type="text" class="form-control" name="title" placeholder="Task title" required>
                            </div>
                            <div class="mb-3">
                                <textarea class="form-control" name="description" placeholder="Description"></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary">Add Task</button>
                        </form>
                        <hr>
                        <div class="task-list">
                            {% for task in tasks %}
                            <div class="task-item mb-2">
                                <h5>{{ task[1] }}</h5>
                                <p>{{ task[2] }}</p>
                                <form action="/update_task/{{ task[0] }}" method="POST" class="d-inline">
                                    <select name="status" class="form-select form-select-sm" onchange="this.form.submit()">
                                        <option value="pending" {% if task[3] == 'pending' %}selected{% endif %}>Pending</option>
                                        <option value="in_progress" {% if task[3] == 'in_progress' %}selected{% endif %}>In Progress</option>
                                        <option value="completed" {% if task[3] == 'completed' %}selected{% endif %}>Completed</option>
                                    </select>
                                </form>
                                <a href="/delete_task/{{ task[0] }}" class="btn btn-sm btn-danger">Delete</a>
                            </div>
                            {% endfor %}
                        </div>
                    </div>
                </div>
            </div>

            <!-- Media Display -->
            <div class="col-md-4">
                <div class="card mt-4">
                    <div class="card-header">
                        <h3>Media</h3>
                    </div>
                    <div class="card-body">
                        <div class="embed-responsive embed-responsive-16by9">
                            <iframe class="embed-responsive-item" src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Note-Taking -->
            <div class="col-md-4">
                <div class="card mt-4">
                    <div class="card-header">
                        <h3>Notes</h3>
                    </div>
                    <div class="card-body">
                        <form action="/add_note" method="POST">
                            <div class="mb-3">
                                <textarea class="form-control" name="content" placeholder="Write a note..." required></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary">Add Note</button>
                        </form>
                        <hr>
                        <div class="note-list">
                            {% for note in notes %}
                            <div class="note-item mb-2">
                                <p>{{ note[1] }}</p>
                                <small class="text-muted">{{ note[2] }}</small>
                            </div>
                            {% endfor %}
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
